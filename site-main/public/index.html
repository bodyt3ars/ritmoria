<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>РИТМОРИЯ</title>
  <meta name="description" content="Ритмория — музыкальная платформа для артистов, треков, опенов, общения и поиска нового звучания.">
  <meta name="keywords" content="Ритмория, музыка, треки, артисты, опены, фит, музыкальная платформа, discover, рэп, beats">
  <meta name="theme-color" content="#2a1624">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="РИТМОРИЯ">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="РИТМОРИЯ">
  <meta property="og:title" content="РИТМОРИЯ">
  <meta property="og:description" content="Музыкальная платформа для артистов, треков, опенов и общения.">
  <meta property="og:url" content="https://ritmoria.com/">
  <meta property="og:image" content="https://ritmoria.com/images/logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="РИТМОРИЯ">
  <meta name="twitter:description" content="Музыкальная платформа для артистов, треков, опенов и общения.">
  <meta name="twitter:image" content="https://ritmoria.com/images/logo.png">
  <link rel="canonical" href="https://ritmoria.com/">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/images/favicon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/images/favicon-192.png">

  <script src="https://w.soundcloud.com/player/api.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

 
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/navbar.css">
  
  
</head>
<body>

  <!-- ВИДЕОФОН -->
  <div class="video-background">
    <video muted loop playsinline id="background-video">
      <source src="/images/bg.mp4" type="video/mp4">
    </video>
  </div>

  <!-- ОБЩИЕ ЭЛЕМЕНТЫ SPA -->
  <div id="navbar"></div>
  <div id="app"></div>
  <div id="player"></div>
  <div id="xpToast" class="xp-toast"></div>
  <div id="rankUpOverlay" class="rank-up-overlay">
    <div class="rank-up-backdrop"></div>

    <div class="rank-up-box">
      <div class="rank-up-burst"></div>
      <div class="rank-up-glow"></div>

      <img id="rankUpMedal" class="rank-up-medal" src="/images/ranks/1.png" alt="rank up">

      <div class="rank-up-texts">
        <div class="rank-up-label">RANK UP</div>
        <div id="rankUpTitle" class="rank-up-title">Новичок</div>
        <div id="rankUpTransition" class="rank-up-transition">Новичок -> Слушатель</div>
        <div id="rankUpGain" class="rank-up-gain">+500 XP</div>
        <div id="rankUpSubtitle" class="rank-up-subtitle">Ты поднял ранг в РИТМОРИИ</div>
      </div>
    </div>
  </div>

  <script src="/js/navbar.js"></script>
  <script src="/js/api-errors.js"></script>
  <script src="/js/profile/profile-user.js"></script>
  <script src="https://unpkg.com/wavesurfer.js"></script>

  <script type="module">
    import { renderPage } from "/js/router.js";
    renderPage(location.pathname + location.search);
  </script>

<div id="globalLoader" class="page-loader hidden">
  <div class="spinner"></div>
</div>

<script src="/js/player.js"></script>

<script>
window.addEventListener("load", () => {
  const video = document.getElementById("background-video");
  if (video) {
    video.play().catch(() => {});
  }
});
</script>
</body>
</html>
