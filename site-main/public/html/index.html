<div class="home-page">
  <h1 class="home-seo-only">Ритмория — музыкальная платформа для артистов, треков, опенов и стримов</h1>
  <div class="home-layout">
    <aside class="home-left-panel">
      <h2 class="home-panel-title home-panel-title-decorated">Лучшие треки прошлого стрима</h2>
      <div id="homeTopTracks" class="home-side-list">
        <div class="home-loading-card">Загрузка треков...</div>
      </div>
    </aside>

    <main class="home-feed">
      <section id="homeNewsBlock" class="home-news-block">
        <div class="home-news-header">
          <h2 class="home-feed-title home-panel-title-decorated">Новости</h2>
        </div>
        <div id="homeNewsList" class="home-news-list">
          <div class="home-loading-card">Загрузка новостей...</div>
        </div>
      </section>

      <section class="home-spotlight-block">
        <div class="home-feed-header home-feed-header-compact">
          <h2 class="home-feed-title home-panel-title-decorated">Открывай треки</h2>
        </div>
        <div class="home-spotlight-shell">
          <button
            type="button"
            class="home-spotlight-arrow home-spotlight-arrow-prev"
            id="homeSpotlightPrev"
            aria-label="Показать предыдущие треки"
          >
            <i class="fa-solid fa-chevron-left"></i>
          </button>

          <div id="homeSpotlightTracks" class="home-spotlight-row">
            <div class="home-loading-card">Загрузка подборки...</div>
          </div>

          <button
            type="button"
            class="home-spotlight-arrow home-spotlight-arrow-next"
            id="homeSpotlightNext"
            aria-label="Показать следующие треки"
          >
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      </section>

      <section class="profile-page home-posts-shell">
        <div class="home-feed-header">
          <h2 class="home-feed-title home-panel-title-decorated">Рекомендации</h2>
        </div>
        <div id="homeFeedPosts" class="home-feed-list">
          <div class="home-loading-card">Загрузка постов...</div>
        </div>
      </section>
    </main>

    <aside class="home-right-panel">
      <h2 class="home-panel-title home-panel-title-decorated">Топ исполнители</h2>
      <div id="homeTopArtists" class="home-side-list">
        <div class="home-loading-card">Загрузка артистов...</div>
      </div>
    </aside>

  </div>
</div>
